<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>⚔️ Painel de Guerra</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="war-page-body">

<div class="overlay-war"></div>
<div id="navbar"></div>

<div class="war-container">
    <h1 class="war-title-custom">WAR PANEL</h1>
    <div class="live-indicator"><span class="live-dot">●</span> LIVE FEED - UPDATING EVERY 3s</div>

    <div class="war-grid-stats">
        <div class="war-card-custom" id="cardDeaths">
            <small>MORTES (FRIEND)</small>
            <span id="totalDeaths" class="stat-val">-</span>
        </div>
        <div class="war-card-custom" id="cardKills">
            <small>KILLS (FRIEND FRAGS)</small>
            <span id="totalKills" class="stat-val">-</span>
        </div>
        <div class="war-card-custom" id="cardKD">
            <small>K/D RATIO</small>
            <span id="kdRatio" class="stat-val">-</span>
        </div>
    </div>

    <div class="tops-grid-war">
        <div class="war-card-custom">
            <h4 style="margin:0; color:#f44;">🔥 ENEMY MAIS PERIGOSO</h4>
            <div id="topEnemy" style="margin-top:10px;">-</div>
        </div>
        <div class="war-card-custom">
            <h4 style="margin:0; color:#0f0;">🏹 FRIEND MAIS AGRESSIVO</h4>
            <div id="topFriend" style="margin-top:10px;">-</div>
        </div>
    </div>

    <div class="killfeed-war">
        <h3 style="margin-top:0; border-bottom: 1px solid #444; padding-bottom: 10px; color: #888;">🩸 ÚLTIMAS BAIXAS INIMIGAS (GERAL)</h3>
        <div id="lastEnemys"></div>
    </div>
</div>

<script src="/assets/navbar.js"></script>
<script>
function tibiaLink(name, color) {
    return `<a href="https://www.tibia.com/community/?name=${encodeURIComponent(name)}" target="_blank" style="color: ${color || 'inherit'}; text-decoration: none; font-weight:bold;">${name}</a>`;
}

async function loadWar() {
    const cards = document.querySelectorAll('.war-card-custom');
    try {
        const res = await fetch('/api/public/war');
        const data = await res.json();

        // Efeito de Glow na atualização
        cards.forEach(c => c.classList.add('update-glow'));
        setTimeout(() => cards.forEach(c => c.classList.remove('update-glow')), 400);

        document.getElementById('totalDeaths').innerText = data.totalDeaths || 0;
        document.getElementById('totalKills').innerText = data.totalKills || 0;

        const kd = data.totalDeaths > 0 ? (data.totalKills / data.totalDeaths).toFixed(2) : (data.totalKills || 0).toFixed(2);
        document.getElementById('kdRatio').innerText = kd;
        document.getElementById('kdRatio').style.color = kd >= 1 ? '#0f0' : '#f00';

        document.getElementById('topEnemy').innerHTML = data.topEnemy ? `${tibiaLink(data.topEnemy[0], '#f44')} <br> <small>${data.topEnemy[1]} Frags</small>` : '—';
        document.getElementById('topFriend').innerHTML = data.topFriend ? `${tibiaLink(data.topFriend[0], '#0f0')} <br> <small>${data.topFriend[1]} Frags</small>` : '—';

        const feed = document.getElementById('lastEnemys');
        feed.innerHTML = data.lastEnemys.length ? data.lastEnemys.map(e => `
            <div class="feed-row-war">
                <span>${new Date(e.time).toLocaleTimeString()} - ${tibiaLink(e.name, '#ff4444')} (Lv ${e.level})</span>
                <span style="color: #666; font-style: italic; font-size: 0.8rem;">por: ${e.killers}</span>
            </div>
        `).join('') : '<div style="text-align:center; color:#333;">Nenhuma queda registrada.</div>';

    } catch (e) { console.error(e); }
}

setInterval(loadWar, 3000);
loadWar();
</script>
</body>
</html>
