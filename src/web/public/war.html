<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>⚔️ Painel de Guerra</title>
<link rel="stylesheet" href="/assets/styles.css">
<link rel="icon" href="/assets/favicon.png">
</head>
<body>

<div class="overlay"></div>
<div id="navbar"></div>

<div class="container">

<h1>⚔️ Painel de Guerra</h1>

<div class="card">
  <h3>🚨 Ameaça Ativa</h3>
  <p id="threat"></p>
</div>

<div class="card">
  <h3>📊 Estatísticas</h3>
  <p id="stats"></p>
</div>

<div class="card">
  <h3>🔥 Enemy Mais Perigoso</h3>
  <p id="topEnemy"></p>
</div>

<div class="card">
  <h3>🏹 Friend Mais Agressivo</h3>
  <p id="topFriend"></p>
</div>

</div>

<script src="/assets/navbar.js"></script>

<script>
async function loadWar() {
  const res = await fetch('/api/public/war');
  const data = await res.json();

  document.getElementById('threat').innerText =
    data.threat
      ? `${data.threat.name} ainda com PZ por ${data.threat.remaining} min`
      : 'Nenhuma ameaça ativa.';

  document.getElementById('stats').innerText =
    `Kills: ${data.totalKills} | Deaths: ${data.totalDeaths}`;

  document.getElementById('topEnemy').innerText =
    data.topEnemy ? `${data.topEnemy[0]} (${data.topEnemy[1]} kills)` : '—';

  document.getElementById('topFriend').innerText =
    data.topFriend ? `${data.topFriend[0]} (${data.topFriend[1]} kills)` : '—';
}

loadWar();
</script>

</body>
</html>
