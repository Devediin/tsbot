<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>⚔️ Painel de Guerra</title>
<link rel="stylesheet" href="/assets/styles.css">
<link rel="icon" href="/assets/favicon.png">
</head>
<body class="war-page-body">

<div class="overlay-war"></div>
<div id="navbar"></div>

<div class="container">

<h1 style="color: #f00; text-shadow: 0 0 15px #f00; text-align: center;">⚔️ Painel de Guerra</h1>
<div class="live-indicator"><span class="live-dot">●</span> Atualizando a cada 3 segundos</div>

<div class="card" id="pzCard">
  <h3>🚨 Ameaça Ativa</h3>
  <div id="threatContainer"></div>
</div>

<div class="war-grid">
  <div class="card" id="cardDeaths">
    <h3>💀 Mortes</h3>
    <div id="totalDeaths" class="war-stat-number" style="color: #f00;"></div>
  </div>

  <div class="card" id="cardKills">
    <h3>🔥 Kills</h3>
    <div id="totalKills" class="war-stat-number" style="color: #0f0;"></div>
  </div>

  <div class="card" id="cardKD">
    <h3>⚖️ K/D</h3>
    <div id="kdRatio" class="war-stat-number"></div>
  </div>
</div>

<div class="war-grid">
  <div class="card war-link" id="cardTopEnemy">
    <h3>🔥 Enemy Mais Perigoso</h3>
    <p id="topEnemy"></p>
  </div>

  <div class="card war-link" id="cardTopFriend">
    <h3>🏹 Friend Mais Agressivo</h3>
    <p id="topFriend"></p>
  </div>
</div>

<!-- Killfeed de baixas inimigas -->
<div class="card" style="background: rgba(0,0,0,0.6);">
    <h3 style="color: #888;">🩸 Últimas Baixas Inimigas (Geral)</h3>
    <div id="lastEnemys"></div>
</div>

</div>

<script src="/assets/navbar.js"></script>

<script>
let threatInterval = null;

function tibiaLink(name) {
  return `<a href="https://www.tibia.com/community/?subtopic=characters&name=${encodeURIComponent(name)}" target="_blank">${name}</a>`;
}

// SUA FUNÇÃO ORIGINAL (Mantida intacta)
function startThreatCountdown(name, remainingMinutes) {
  const container = document.getElementById('threatContainer');
  const totalSeconds = 15 * 60;
  let remainingSeconds = Math.floor(remainingMinutes * 60);

  container.innerHTML = `
    <div class="threat-wrapper">
      <div class="threat-header">
        <span class="skull">☠️</span>
        <span class="threat-badge">PZ ATIVA</span>
        <span id="threatText"></span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>
  `;

  const threatText = document.getElementById('threatText');
  const progressFill = document.getElementById('progressFill');
  if (threatInterval) clearInterval(threatInterval);

  threatInterval = setInterval(() => {
    if (remainingSeconds <= 0) {
      clearInterval(threatInterval);
      container.innerHTML = 'Nenhuma ameaça ativa.';
      return;
    }
    const minutes = Math.floor(remainingSeconds / 60);
    const seconds = remainingSeconds % 60;
    threatText.innerHTML = `${tibiaLink(name)} — ${minutes}m ${seconds}s restantes`;
    const percent = (remainingSeconds / totalSeconds) * 100;
    progressFill.style.width = percent + '%';
    remainingSeconds--;
  }, 1000);
}

async function loadWar() {
  const res = await fetch('/api/public/war');
  const data = await res.json();

  // Efeito Glow nos cards
  const cards = document.querySelectorAll('.card');
  cards.forEach(c => c.classList.add('update-glow'));
  setTimeout(() => cards.forEach(c => c.classList.remove('update-glow')), 400);

  if (data.threat) {
    startThreatCountdown(data.threat.name, data.threat.remaining);
  } else {
    if (!threatInterval) document.getElementById('threatContainer').innerText = 'Nenhuma PZ ativa.';
  }

  document.getElementById('totalDeaths').innerText = data.totalDeaths;
  document.getElementById('totalKills').innerText = data.totalKills;

  const kd = data.totalDeaths > 0 ? (data.totalKills / data.totalDeaths).toFixed(2) : data.totalKills.toFixed(2);
  const kdElement = document.getElementById('kdRatio');
  kdElement.innerText = kd;
  kdElement.style.color = kd >= 1 ? '#0f0' : '#f00';

  document.getElementById('topEnemy').innerHTML = data.topEnemy ? `${tibiaLink(data.topEnemy[0])} — ${data.topEnemy[1]} frags` : '—';
  document.getElementById('topFriend').innerHTML = data.topFriend ? `${tibiaLink(data.topFriend[0])} — ${data.topFriend[1]} frags` : '—';

  // Renderiza Killfeed de Inimigos
  const feed = document.getElementById('lastEnemys');
  feed.innerHTML = data.lastEnemys.map(e => `
    <div style="display:flex; justify-content:space-between; padding: 5px; border-bottom: 1px solid #222; font-size: 0.85rem;">
        <span>${new Date(e.time).toLocaleTimeString()} - ${tibiaLink(e.name)} (Lv ${e.level})</span>
        <span style="color: #666; font-style: italic;">por: ${e.killers}</span>
    </div>
  `).join('');
}

// Atualiza a cada 3 segundos
setInterval(loadWar, 3000);
loadWar();

</script>
</body>
</html>
