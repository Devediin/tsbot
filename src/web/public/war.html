<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>⚔️ Painel de Guerra</title>
<link rel="stylesheet" href="/assets/styles.css">
<link rel="icon" href="/assets/favicon.png">

<style>

.war-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.war-stat-number {
  font-size: 32px;
  font-weight: bold;
}

.kd-positive { color: #00ff88; }
.kd-negative { color: #ff4444; }

.threat-wrapper {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.threat-header {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: bold;
  font-size: 18px;
}

.threat-badge {
  background: #ff0000;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 1px;
}

.skull {
  font-size: 20px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.6; }
  100% { transform: scale(1); opacity: 1; }
}

.progress-bar {
  width: 100%;
  height: 14px;
  background: #2b2b2b;
  border-radius: 7px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #ff0000, #ff8800);
  transition: width 1s linear;
}

.war-link a {
  color: #00AAFF;
  text-decoration: none;
}

.war-link a:hover {
  text-decoration: underline;
}

</style>

</head>
<body>

<div class="overlay"></div>
<div id="navbar"></div>

<div class="container">

<h1>⚔️ War Control Panel</h1>

<div class="card">
  <h3>🚨 Active Threat</h3>
  <div id="threatContainer"></div>
</div>

<div class="war-grid">

  <div class="card">
    <h3>💀 Deaths</h3>
    <div id="totalDeaths" class="war-stat-number"></div>
  </div>

  <div class="card">
    <h3>🔥 Kills</h3>
    <div id="totalKills" class="war-stat-number"></div>
  </div>

  <div class="card">
    <h3>⚖️ K/D Ratio</h3>
    <div id="kdRatio" class="war-stat-number"></div>
  </div>

</div>

<div class="war-grid">

  <div class="card war-link">
    <h3>🔥 Most Dangerous Enemy</h3>
    <p id="topEnemy"></p>
  </div>

  <div class="card war-link">
    <h3>🏹 Most Aggressive Friend</h3>
    <p id="topFriend"></p>
  </div>

</div>

</div>

<script src="/assets/navbar.js"></script>

<script>

let threatInterval = null;

function tibiaLink(name) {
  return `<a href="https://www.tibia.com/community/?name=${encodeURIComponent(name)}" target="_blank">${name}</a>`;
}

function startThreatCountdown(name, remainingMinutes) {

  const container = document.getElementById('threatContainer');
  const totalSeconds = 15 * 60;
  let remainingSeconds = remainingMinutes * 60;

  container.innerHTML = `
    <div class="threat-wrapper">
      <div class="threat-header">
        <span class="skull">☠️</span>
        <span class="threat-badge">PZ ACTIVE</span>
        <span id="threatText"></span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>
  `;

  const threatText = document.getElementById('threatText');
  const progressFill = document.getElementById('progressFill');

  if (threatInterval) clearInterval(threatInterval);

  threatInterval = setInterval(() => {

    if (remainingSeconds <= 0) {
      clearInterval(threatInterval);
      container.innerHTML = 'No active threats.';
      return;
    }

    const minutes = Math.floor(remainingSeconds / 60);
    const seconds = remainingSeconds % 60;

    threatText.innerHTML =
      `${tibiaLink(name)} — ${minutes}m ${seconds}s remaining`;

    const percent = (remainingSeconds / totalSeconds) * 100;
    progressFill.style.width = percent + '%';

    remainingSeconds--;

  }, 1000);
}

async function loadWar() {
  const res = await fetch('/api/public/war');
  const data = await res.json();

  if (data.threat) {
    startThreatCountdown(data.threat.name, data.threat.remaining);
  } else {
    document.getElementById('threatContainer').innerText = 'No active threats.';
  }

  document.getElementById('totalDeaths').innerText = data.totalDeaths;
  document.getElementById('totalKills').innerText = data.totalKills;

  const kd = data.totalDeaths > 0
    ? (data.totalKills / data.totalDeaths).toFixed(2)
    : data.totalKills.toFixed(2);

  const kdElement = document.getElementById('kdRatio');
  kdElement.innerText = kd;

  if (kd >= 1) {
    kdElement.classList.add('kd-positive');
  } else {
    kdElement.classList.add('kd-negative');
  }

  document.getElementById('topEnemy').innerHTML =
    data.topEnemy
      ? `${tibiaLink(data.topEnemy[0])} — ${data.topEnemy[1]} kills`
      : '—';

  document.getElementById('topFriend').innerHTML =
    data.topFriend
      ? `${tibiaLink(data.topFriend[0])} — ${data.topFriend[1]} kills`
      : '—';
}

loadWar();

</script>

</body>
</html>
