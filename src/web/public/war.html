<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>⚔️ Painel de Guerra</title>
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { 
    margin: 0; padding: 0;
    background: url('https://www.tibiabr.com/wp-content/uploads/2017/07/bk_1280.960.jpg') no-repeat center center fixed;
    background-size: cover;
  }
  .overlay-war {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    z-index: -1;
  }
  .war-container { max-width: 1000px; margin: 0 auto; padding: 20px; font-family: sans-serif; color: white; }
  .war-title { color: #ff0000; text-align: center; text-transform: uppercase; font-size: 2.5rem; text-shadow: 0 0 20px #f00; margin-bottom: 5px; }
  .live-indicator { text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 20px; }
  .live-dot { color: #f00; animation: blink 1s infinite; }
  @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

  .war-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
  .war-card { 
    background: rgba(30, 0, 0, 0.6); border: 1px solid #500; border-radius: 8px; padding: 20px; text-align: center;
    transition: box-shadow 0.3s ease-in-out;
  }
  .update-glow { box-shadow: 0 0 30px rgba(255, 0, 0, 0.6) !important; }
  
  .stat-val { font-size: 3.5rem; font-weight: 900; display: block; }
  #totalKills { color: #0f0; text-shadow: 0 0 15px #0f0; }
  #totalDeaths { color: #f00; text-shadow: 0 0 15px #f00; }
  
  .tops-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .killfeed { background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 8px; padding: 15px; margin-top: 20px; }
  .feed-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 0.9rem; }
  .feed-name { color: #ff4444; font-weight: bold; text-decoration: none; }
  
  @media (max-width: 768px) { .war-grid, .tops-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="overlay-war"></div>
<div id="navbar"></div>

<div class="war-container">
  <h1 class="war-title">WAR PANEL</h1>
  <div class="live-indicator"><span class="live-dot">●</span> LIVE FEED - UPDATING EVERY 3s</div>

  <div class="war-grid">
    <div class="war-card" id="cardDeaths">
      <small>MORTES (FRIEND)</small>
      <span id="totalDeaths" class="stat-val">-</span>
    </div>
    <div class="war-card" id="cardKills">
      <small>KILLS (FRIEND FRAGS)</small>
      <span id="totalKills" class="stat-val">-</span>
    </div>
    <div class="war-card" id="cardKD">
      <small>K/D RATIO</small>
      <span id="kdRatio" class="stat-val">-</span>
    </div>
  </div>

  <div class="tops-grid">
    <div class="war-card">
      <h4 style="margin:0; color:#f44;">🔥 ENEMY MAIS PERIGOSO</h4>
      <div id="topEnemy" style="margin-top:10px;">-</div>
    </div>
    <div class="war-card">
      <h4 style="margin:0; color:#0f0;">🏹 FRIEND MAIS AGRESSIVO</h4>
      <div id="topFriend" style="margin-top:10px;">-</div>
    </div>
  </div>

  <div class="killfeed">
    <h3 style="margin-top:0; border-bottom: 1px solid #444; padding-bottom: 10px; color: #888;">🩸 ÚLTIMAS BAIXAS INIMIGAS (GERAL)</h3>
    <div id="lastEnemys"></div>
  </div>
</div>

<script src="/assets/navbar.js"></script>
<script>
function tibiaLink(name, color) {
  return `<a href="https://www.tibia.com/community/?name=${encodeURIComponent(name)}" target="_blank" style="color: ${color || 'inherit'}; text-decoration: none; font-weight:bold;">${name}</a>`;
}

async function loadWar() {
  const cards = document.querySelectorAll('.war-card');
  try {
    const res = await fetch('/api/public/war');
    const data = await res.json();

    // Efeito de Brilho ao atualizar
    cards.forEach(c => c.classList.add('update-glow'));
    setTimeout(() => cards.forEach(c => c.classList.remove('update-glow')), 500);

    document.getElementById('totalDeaths').innerText = data.totalDeaths || 0;
    document.getElementById('totalKills').innerText = data.totalKills || 0;

    const kd = data.totalDeaths > 0 ? (data.totalKills / data.totalDeaths).toFixed(2) : (data.totalKills || 0).toFixed(2);
    document.getElementById('kdRatio').innerText = kd;
    document.getElementById('kdRatio').style.color = kd >= 1 ? '#0f0' : '#f00';

    document.getElementById('topEnemy').innerHTML = data.topEnemy ? `${tibiaLink(data.topEnemy[0], '#f44')} <br> <small>${data.topEnemy[1]} Frags</small>` : '—';
    document.getElementById('topFriend').innerHTML = data.topFriend ? `${tibiaLink(data.topFriend[0], '#0f0')} <br> <small>${data.topFriend[1]} Frags</small>` : '—';

    const feed = document.getElementById('lastEnemys');
    feed.innerHTML = data.lastEnemys.length ? data.lastEnemys.map(e => `
      <div class="feed-row">
        <span>${new Date(e.time).toLocaleTimeString()} - ${tibiaLink(e.name, '#ff4444')} (Lv ${e.level})</span>
        <span style="color: #666; font-style: italic; font-size: 0.8rem;">por: ${e.killers}</span>
      </div>
    `).join('') : '<div style="text-align:center; color:#333;">Nenhuma queda registrada.</div>';

  } catch (e) { console.error(e); }
}

setInterval(loadWar, 3000);
loadWar();
</script>
</body>
</html>
