<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>📅 Ranking Mensal</title>
<link rel="stylesheet" href="/assets/styles.css">
<link rel="icon" href="/assets/favicon.png">
</head>
<body>

<div class="overlay"></div>
<div id="navbar"></div>

<div class="container">

<h1>📅 Ranking Mensal</h1>

<div class="ranking-grid">

  <div class="card">
    <h3>📈 Quem Mais Upou</h3>
    <ul id="levelList">
      <li class="loading">⏳ Carregando...</li>
    </ul>
  </div>

  <div class="card">
    <h3>💀 Mais Mortes</h3>
    <ul id="deathList">
      <li class="loading">⏳ Carregando...</li>
    </ul>
  </div>

  <div class="card">
    <h3>✨ Últimos Level Ups</h3>
    <ul id="recentLevelUps">
      <li class="loading">⏳ Carregando...</li>
    </ul>
  </div>

</div>

</div>

<script src="/assets/navbar.js"></script>

<script>
async function loadRanking() {
  try {
    const res = await fetch('/api/public/ranking-monthly');
    const data = await res.json();

    const levelList = document.getElementById('levelList');
    const deathList = document.getElementById('deathList');
    const recentList = document.getElementById('recentLevelUps');

    levelList.innerHTML = '';
    deathList.innerHTML = '';
    recentList.innerHTML = '';

    const getColor = (type) => type === 'enemy' ? '#ff4444' : (type === 'friend' ? '#00ff00' : '#fff');

    // LISTA 1: QUEM MAIS UPOU
    if (data.levelRanking && data.levelRanking.length > 0) {
      data.levelRanking.slice(0,10).forEach((p, i) => {
        levelList.innerHTML += `<li><span style="color:#444">#${i+1}</span> <a href="https://www.tibia.com/community/?name=${encodeURIComponent(p.name)}" target="_blank" style="color:${getColor(p.type)}; text-decoration:none; font-weight:bold;">${p.name}</a> <small style="color:#666">+${p.totalGain}</small></li>`;
      });
    }

    // LISTA 2: MAIS MORTES
    if (data.deathRanking && data.deathRanking.length > 0) {
      data.deathRanking.slice(0,10).forEach((p, i) => {
        deathList.innerHTML += `<li><span style="color:#444">#${i+1}</span> <a href="https://www.tibia.com/community/?name=${encodeURIComponent(p.name)}" target="_blank" style="color:${getColor(p.type)}; text-decoration:none; font-weight:bold;">${p.name}</a> <small style="color:#666">${p.deaths}</small></li>`;
      });
    }

    // LISTA 3: ÚLTIMOS LEVEL UPS (COLORIDO)
    if (data.recentLevelUps && data.recentLevelUps.length > 0) {
      data.recentLevelUps.forEach(entry => {
        recentList.innerHTML += `
          <li style="margin-bottom:5px;">
            <span style="color:#666">✨</span> 
            <a href="https://www.tibia.com/community/?name=${encodeURIComponent(entry.name)}" target="_blank" style="color:${getColor(entry.type)}; text-decoration:none; font-weight:bold;">${entry.name}</a> 
            <span style="color:#fff; font-size:0.85rem;">(Lv ${entry.level})</span>
          </li>`;
      });
    } else {
      recentList.innerHTML = '<li>Nenhum registro recente.</li>';
    }

  } catch (e) { console.log('Erro ao carregar ranking'); }
}
loadRanking();
</script>

</body>
</html>
