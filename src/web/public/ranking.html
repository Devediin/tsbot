<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>📅 Ranking Mensal</title>
<link rel="stylesheet" href="/assets/styles.css">
<link rel="icon" href="/assets/favicon.png">
</head>
<body>

<div class="overlay"></div>
<div id="navbar"></div>

<div class="container">

<h1>📅 Ranking Mensal</h1>

<div class="ranking-grid">

  <div class="card">
    <h3>📈 Quem Mais Upou</h3>
    <ul id="levelList">
      <li class="loading">⏳ Carregando...</li>
    </ul>
  </div>

  <div class="card">
    <h3>💀 Mais Mortes</h3>
    <ul id="deathList">
      <li class="loading">⏳ Carregando...</li>
    </ul>
  </div>

  <div class="card">
    <h3>✨ Últimos Level Ups</h3>
    <ul id="recentLevelUps">
      <li class="loading">⏳ Carregando...</li>
    </ul>
  </div>

</div>

</div>

<script src="/assets/navbar.js"></script>

<script>
async function loadRanking() {
  try {
    const res = await fetch('/api/public/ranking-monthly');
    const data = await res.json();

    const levelList = document.getElementById('levelList');
    const deathList = document.getElementById('deathList');
    const recentList = document.getElementById('recentLevelUps');

    levelList.innerHTML = '';
    deathList.innerHTML = '';
    recentList.innerHTML = '';

    const getColor = (type) => type === 'enemy' ? '#ff4444' : (type === 'friend' ? '#00ff00' : '#fff');

    // ✅ LEVEL RANKING
    if (data.levelRanking && data.levelRanking.length > 0) {
      data.levelRanking.slice(0,10).forEach((p, index) => {
        const color = getColor(p.type);
        levelList.innerHTML += `
          <li style="margin-bottom: 8px;">
            <span style="color: #555;">#${index+1}</span> 
            <a href="https://www.tibia.com/community/?name=${encodeURIComponent(p.name)}" target="_blank" style="color: ${color}; text-decoration: none; font-weight: bold;">${p.name}</a> 
            <span style="color: #888;">— +${p.totalGain} levels</span>
          </li>`;
      });
    }

    // ✅ DEATH RANKING
    if (data.deathRanking && data.deathRanking.length > 0) {
      data.deathRanking.slice(0,10).forEach((p, index) => {
        const color = getColor(p.type);
        deathList.innerHTML += `
          <li style="margin-bottom: 8px;">
            <span style="color: #555;">#${index+1}</span> 
            <a href="https://www.tibia.com/community/?name=${encodeURIComponent(p.name)}" target="_blank" style="color: ${color}; text-decoration: none; font-weight: bold;">${p.name}</a> 
            <span style="color: #888;">— ${p.deaths} mortes</span>
          </li>`;
      });
    }

    // ✅ RECENT LEVEL UPS
    if (data.recentLevelUps && data.recentLevelUps.length > 0) {
      data.recentLevelUps.forEach(entry => {
        const color = getColor(entry.type);
        recentList.innerHTML += `
          <li style="margin-bottom: 5px; font-size: 0.9rem;">
            <span style="color: #666;">✨</span> 
            <a href="https://www.tibia.com/community/?name=${encodeURIComponent(entry.name)}" target="_blank" style="color: ${color}; text-decoration: none;">${entry.name}</a> 
            <b style="color: #aaa;">Lv ${entry.level}</b>
          </li>`;
      });
    }

  } catch (e) { console.log('Erro ao carregar ranking'); }
}
loadRanking();
</script>

</body>
</html>
