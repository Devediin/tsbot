<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏆 Ranking</title>
<link rel="stylesheet" href="/assets/styles.css">
<link rel="icon" href="/assets/favicon.png">
</head>
<body>

<div class="overlay"></div>
<div id="navbar"></div>

<div class="container">

<h1>🏆 Ranking do Time</h1>

<div class="card">
  <h2>👑 Maior Level Atual</h2>
  <p id="topLevel">⏳ Carregando...</p>
</div>

</div>

<script src="/assets/navbar.js"></script>

<script>
async function loadRanking() {
  const res = await fetch('/api/public/ranking');
  const data = await res.json();

  if (data.topLevel) {
    document.getElementById('topLevel').innerHTML =
      `👑 <a href="https://www.tibia.com/community/?name=${encodeURIComponent(data.topLevel.name)}" target="_blank">
        ${data.topLevel.name}
      </a> — Level ${data.topLevel.level}`;
  } else {
    document.getElementById('topLevel').innerText = 'Sem dados.';
  }
}

loadRanking();
</script>

</body>
</html>
