<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏆 Ranking do Time</title>
<link rel="stylesheet" href="/assets/styles.css">
<link rel="icon" href="/assets/favicon.png">
</head>
<body>

<div class="overlay"></div>
<div id="navbar"></div>
<p id="playerOfMonth">⏳ Carregando...</p>
<div class="container">

<h1>🏆 Ranking do Time</h1>

<h2 style="margin-top:40px;">📅 Ranking Mensal</h2>

<div class="ranking-grid">

  <div class="card">
    <h3>📈 Quem Mais Upou</h3>
    <ul id="levelUpList">
      <li class="loading">⏳ Carregando...</li>
    </ul>
  </div>

  <div class="card">
    <h3>💀 Mais Mortes</h3>
    <ul id="deathList">
      <li class="loading">⏳ Carregando...</li>
    </ul>
  </div>

  <div class="card">
    <h3>⏳ Mais Tempo Online</h3>
    <ul id="onlineList">
      <li class="loading">⏳ Carregando...</li>
    </ul>
  </div>

</div>

</div>

<script src="/assets/navbar.js"></script>

<script>
async function loadAdvanced() {

  const levelList = document.getElementById('levelUpList');
  const deathList = document.getElementById('deathList');
  const onlineList = document.getElementById('onlineList');

  try {
    const res = await fetch('/api/public/ranking-advanced');
    const data = await res.json();

    levelList.innerHTML = '';
    deathList.innerHTML = '';
    onlineList.innerHTML = '';

    data.levelUpRanking.slice(0,5).forEach((p, index) => {
      levelList.innerHTML += `
        <li class="${index === 0 ? 'top-1' : ''}">
          🏆 ${p.name} — +${p.levelGain} levels
        </li>`;
    });

    data.deathRanking.slice(0,5).forEach((p, index) => {
      deathList.innerHTML += `
        <li class="${index === 0 ? 'top-1' : ''}">
          💀 ${p.name} — ${p.deaths} mortes
        </li>`;
    });

    data.onlineRanking.slice(0,5).forEach((p, index) => {
      const hours = Math.floor(p.minutes / 60);
      onlineList.innerHTML += `
        <li class="${index === 0 ? 'top-1' : ''}">
          ⏳ ${p.name} — ${hours}h online
        </li>`;
    });

  } catch (e) {
    levelList.innerHTML = '<li>Erro ao carregar.</li>';
    deathList.innerHTML = '<li>Erro ao carregar.</li>';
    onlineList.innerHTML = '<li>Erro ao carregar.</li>';
  }
}

loadAdvanced();
</script>

</body>
</html>
