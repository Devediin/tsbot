<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏆 Ranking do Time</title>
<link rel="stylesheet" href="/assets/styles.css">
<link rel="icon" href="/assets/favicon.png">
</head>
<body>

<div class="overlay"></div>
<div id="navbar"></div>

<div class="container">

<h1>🏆 Ranking do Time</h1>

<h2 style="margin-top:40px;">📅 Ranking Mensal</h2>

<div class="ranking-grid">

  <div class="card">
    <h3>📈 Quem Mais Upou</h3>
    <ul id="levelUpList">
      <li class="loading">⏳ Carregando ranking...</li>
    </ul>
  </div>

  <div class="card">
    <h3>💀 Mais Mortes</h3>
    <ul id="deathList">
      <li class="loading">⏳ Carregando ranking...</li>
    </ul>
  </div>

  <div class="card">
    <h3>⏳ Mais Tempo Online</h3>
    <ul id="onlineList">
      <li class="loading">⏳ Carregando ranking...</li>
    </ul>
  </div>

</div>

</div>

<script src="/assets/navbar.js"></script>

<script>
async function loadRanking() {
  try {
    const res = await fetch('/api/public/ranking-advanced');
    const data = await res.json();

    const levelList = document.getElementById('levelUpList');
    const deathList = document.getElementById('deathList');
    const onlineList = document.getElementById('onlineList');

    levelList.innerHTML = '';
    deathList.innerHTML = '';
    onlineList.innerHTML = '';

    if (data.levelUpRanking && data.levelUpRanking.length > 0) {
      data.levelUpRanking.slice(0,5).forEach((p, index) => {
        levelList.innerHTML += `
          <li class="${index === 0 ? 'top-1' : ''}">
            🏆 <a href="https://www.tibia.com/community/?name=${encodeURIComponent(p.name)}" target="_blank">
              ${p.name}
            </a> — +${p.levelGain} levels
          </li>`;
      });
    } else {
      levelList.innerHTML = '<li>Sem dados suficientes.</li>';
    }

    if (data.deathRanking && data.deathRanking.length > 0) {
      data.deathRanking.slice(0,5).forEach((p, index) => {
        deathList.innerHTML += `
          <li class="${index === 0 ? 'top-1' : ''}">
            💀 <a href="https://www.tibia.com/community/?name=${encodeURIComponent(p.name)}" target="_blank">
              ${p.name}
            </a> — ${p.deaths} mortes
          </li>`;
      });
    } else {
      deathList.innerHTML = '<li>Sem mortes no período.</li>';
    }

    if (data.onlineRanking && data.onlineRanking.length > 0) {
      data.onlineRanking.slice(0,5).forEach((p, index) => {
        const hours = Math.floor(p.minutes / 60);
        onlineList.innerHTML += `
          <li class="${index === 0 ? 'top-1' : ''}">
            ⏳ <a href="https://www.tibia.com/community/?name=${encodeURIComponent(p.name)}" target="_blank">
              ${p.name}
            </a> — ${hours}h online
          </li>`;
      });
    } else {
      onlineList.innerHTML = '<li>Sem dados de online.</li>';
    }

  } catch (e) {
    console.log('Erro ao carregar ranking');
  }
}

loadRanking();
</script>

</body>
</html>
