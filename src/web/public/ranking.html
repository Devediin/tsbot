<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏆 Ranking do Time</title>
<link rel="stylesheet" href="/assets/styles.css">
<link rel="icon" href="/assets/favicon.png">
</head>
<body>

<div class="overlay"></div>
<div id="navbar"></div>

<div class="container">

<h1>🏆 Ranking do Time</h1>

<!-- RANKING GERAL -->
<div class="card">
  <h2>👑 Maior Level Atual</h2>
  <p id="topLevel"></p>
</div>

<div class="card">
  <h2>🔥 Mais Tempo Online Hoje</h2>
  <p id="topOnline"></p>
</div>

<div class="card">
  <h2>📊 Média de Level do Time</h2>
  <p id="avgLevel"></p>
</div>

<!-- DIVISOR -->
<hr style="margin:40px 0; opacity:0.3;">

<h1>📅 Ranking Mensal</h1>

<div class="card">
  <h2>📈 Quem Mais Upou (30 dias)</h2>
  <ul id="levelUpList"></ul>
</div>

<div class="card">
  <h2>💀 Mais Mortes (30 dias)</h2>
  <ul id="deathList"></ul>
</div>

<div class="card">
  <h2>⏳ Mais Tempo Online</h2>
  <ul id="onlineList"></ul>
</div>

</div>

<script src="/assets/navbar.js"></script>

<script>
async function loadRanking() {
  const res = await fetch('/api/public/ranking');
  const data = await res.json();

  if (!data.topLevel) return;

  document.getElementById('topLevel').innerText =
    `${data.topLevel.name} — Level ${data.topLevel.level}`;

  document.getElementById('topOnline').innerText =
    `${data.topOnlineToday.name}`;

  document.getElementById('avgLevel').innerText =
    data.averageLevel;
}

async function loadAdvanced() {
  const res = await fetch('/api/public/ranking-advanced');
  const data = await res.json();

  if (!data.levelUpRanking) return;

  const levelList = document.getElementById('levelUpList');
  const deathList = document.getElementById('deathList');
  const onlineList = document.getElementById('onlineList');

  levelList.innerHTML = '';
  deathList.innerHTML = '';
  onlineList.innerHTML = '';

  data.levelUpRanking.slice(0,5).forEach(p => {
    levelList.innerHTML += `<li>🏆 ${p.name} — +${p.levelGain} levels</li>`;
  });

  data.deathRanking.slice(0,5).forEach(p => {
    deathList.innerHTML += `<li>💀 ${p.name} — ${p.deaths} mortes</li>`;
  });

  data.onlineRanking.slice(0,5).forEach(p => {
    const hours = Math.floor(p.minutes / 60);
    onlineList.innerHTML += `<li>⏳ ${p.name} — ${hours}h online</li>`;
  });
}

loadRanking();
loadAdvanced();
</script>

</body>
</html>
