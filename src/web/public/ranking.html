<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>📅 Ranking Mensal</title>
<link rel="stylesheet" href="/assets/styles.css">
<link rel="icon" href="/assets/favicon.png">
</head>
<body>

<div class="overlay"></div>
<div id="navbar"></div>

<div class="container">

<h1>📅 Ranking Mensal</h1>

<div class="ranking-grid">

  <div class="card">
    <h3>📈 Quem Mais Upou</h3>
    <ul id="levelList">
      <li class="loading">⏳ Carregando...</li>
    </ul>
  </div>

  <div class="card">
    <h3>💀 Mais Mortes</h3>
    <ul id="deathList">
      <li class="loading">⏳ Carregando...</li>
    </ul>
  </div>

</div>

</div>

<script src="/assets/navbar.js"></script>

<script>
async function loadRanking() {
  try {
    const res = await fetch('/api/public/ranking-monthly');
    const data = await res.json();

    const levelList = document.getElementById('levelList');
    const deathList = document.getElementById('deathList');

    levelList.innerHTML = '';
    deathList.innerHTML = '';

    if (data.levelRanking.length > 0) {
      data.levelRanking.slice(0,5).forEach((p, index) => {
        levelList.innerHTML += `
          <li class="${index === 0 ? 'top-1' : ''}">
            🏆 <a href="https://www.tibia.com/community/?name=${encodeURIComponent(p.name)}" target="_blank">
              ${p.name}
            </a> — +${p.totalGain} levels
          </li>`;
      });
    } else {
      levelList.innerHTML = '<li>Sem level ups no mês.</li>';
    }

    if (data.deathRanking.length > 0) {
      data.deathRanking.slice(0,5).forEach((p, index) => {
        deathList.innerHTML += `
          <li class="${index === 0 ? 'top-1' : ''}">
            💀 <a href="https://www.tibia.com/community/?name=${encodeURIComponent(p.name)}" target="_blank">
              ${p.name}
            </a> — ${p.deaths} mortes
          </li>`;
      });
    } else {
      deathList.innerHTML = '<li>Sem mortes no mês.</li>';
    }

  } catch (e) {
    console.log('Erro ao carregar ranking');
  }
}

loadRanking();
</script>

</body>
</html>
