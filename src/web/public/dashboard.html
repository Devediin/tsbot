<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiideHelper Dashboard</title>

<style>
body {
  background:#2b1b10;
  font-family:Tahoma;
  color:white;
  margin:0;
}

.navbar {
  background:#3e2a17;
  padding:15px;
  text-align:center;
  border-bottom:2px solid #8b5a2b;
}

.navbar a {
  color:#ffd700;
  text-decoration:none;
  margin:0 20px;
  font-weight:bold;
}

.container {
  width:90%;
  margin:auto;
  padding:40px;
}

h1 {
  text-align:center;
  color:#ffd700;
}

.card {
  background:#3e2a17;
  border:2px solid #8b5a2b;
  border-radius:8px;
  padding:20px;
  margin-top:30px;
}

h2 {
  color:#ffd700;
  text-align:center;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th {
  background:#4e3420;
  padding:8px;
  text-align:center;
  color:#ffd700;
}

td {
  padding:8px;
  text-align:center;
  border-bottom:1px solid #5e3f24;
}

.counter {
  text-align:center;
  margin-top:15px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
  <a href="/login.html">🔐 Admin</a>
</div>

<div class="container">

<h1>⚔️ Online Members ⚔️</h1>

<div id="online"></div>

<div class="card">
  <h2>💀 Últimas Mortes</h2>
  <table>
    <thead>
      <tr>
        <th>Personagem</th>
        <th>Level</th>
        <th>Killer</th>
      </tr>
    </thead>
    <tbody id="deathsTable"></tbody>
  </table>
</div>

<div class="counter">
  Atualiza em <span id="timer">15</span>s
</div>

</div>

<script>

let refreshInterval = 15;
let timer = refreshInterval;

function tibiaLink(name) {
  return `https://www.tibia.com/community/?name=${encodeURIComponent(name)}`;
}

async function loadOnline() {
  const res = await fetch('/api/public/online');
  const data = await res.json();

  let html = '';

  for (const vocation in data) {
    if (data[vocation].length > 0) {

      html += `
        <div class="card">
          <h2>${vocation}</h2>
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Level</th>
                <th>Tempo Online</th>
              </tr>
            </thead>
            <tbody>
      `;

      data[vocation].forEach(p => {
        html += `
          <tr>
            <td><a href="${tibiaLink(p.name)}" target="_blank">${p.name}</a></td>
            <td>${p.level}</td>
            <td>${p.onlineTime}</td>
          </tr>
        `;
      });

      html += `</tbody></table></div>`;
    }
  }

  document.getElementById('online').innerHTML = html;
}

async function loadDeaths() {
  const res = await fetch('/api/public/deaths');
  const data = await res.json();

  const tbody = document.getElementById('deathsTable');
  tbody.innerHTML = '';

  data.deaths.forEach(d => {
    tbody.innerHTML += `
      <tr>
        <td><a href="${tibiaLink(d.characterName)}" target="_blank">${d.characterName}</a></td>
        <td>${d.level}</td>
        <td>${d.killer}</td>
      </tr>
    `;
  });
}

function updateTimer() {
  timer--;
  document.getElementById('timer').innerText = timer;

  if (timer <= 0) {
    timer = refreshInterval;
    loadOnline();
    loadDeaths();
  }
}

loadOnline();
loadDeaths();
setInterval(updateTimer, 1000);

</script>

</body>
</html>
