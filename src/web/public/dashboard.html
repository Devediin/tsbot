<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiideHelper Dashboard</title>

<style>
body {
  background: radial-gradient(circle at center, #3e2a17 0%, #2b1b10 70%);
  font-family: "Trebuchet MS", Tahoma;
  color: #fff;
  margin: 0;
}

.navbar {
  background: linear-gradient(#4e3420, #3e2a17);
  padding: 15px;
  text-align: center;
  border-bottom: 3px solid gold;
}

.navbar a {
  color: gold;
  text-decoration: none;
  margin: 0 20px;
  font-weight: bold;
}

h1 {
  text-align: center;
  color: gold;
  margin: 30px 0;
  text-shadow: 2px 2px black;
}

.container {
  width: 80%;
  margin: auto;
}

.vocation-box {
  border: 2px solid gold;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 25px;
  background: #3e2a17;
}

.vocation-box h2 {
  margin-top: 0;
  color: gold;
  border-bottom: 1px solid gold;
  padding-bottom: 5px;
}

ul {
  list-style: none;
  padding-left: 0;
}

li {
  padding: 6px 0;
  border-bottom: 1px solid #5e3f24;
}

.death-box {
  border: 2px solid red;
  border-radius: 8px;
  padding: 15px;
  background: #3e2a17;
}

.death-box h2 {
  color: red;
}

.counter {
  text-align: center;
  margin-top: 20px;
  color: #aaa;
}

a {
  color: #00AAFF;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
</div>

<h1>⚔️ Online Members ⚔️</h1>

<div class="container" id="online"></div>

<div class="container death-box">
  <h2>💀 Últimas Mortes</h2>
  <ul id="deaths"></ul>
</div>

<div class="counter">
  Atualiza em <span id="timer">15</span>s
</div>

<script>

let refreshInterval = 15;
let timer = refreshInterval;

function tibiaLink(name) {
  return `https://www.tibia.com/community/?name=${encodeURIComponent(name)}`;
}

async function loadOnline() {
  const res = await fetch('/api/public/online');
  const data = await res.json();

  const container = document.getElementById('online');
  container.innerHTML = '';

  for (const vocation in data) {
    if (data[vocation].length > 0) {

      let html = `<div class="vocation-box">
        <h2>${vocation}</h2>
        <ul>`;

      data[vocation].forEach(p => {
        html += `
          <li>
            <a href="${tibiaLink(p.name)}" target="_blank">${p.name}</a>
            — Level ${p.level}
            — ${p.onlineTime}
          </li>
        `;
      });

      html += `</ul></div>`;

      container.innerHTML += html;
    }
  }
}

async function loadDeaths() {
  const res = await fetch('/api/public/deaths');
  const data = await res.json();

  const list = document.getElementById('deaths');
  list.innerHTML = '';

  data.deaths.forEach(d => {
    list.innerHTML += `
      <li>
        <a href="${tibiaLink(d.characterName)}" target="_blank">${d.characterName}</a>
        morreu no level ${d.level} para ${d.killer}
      </li>
    `;
  });
}

function updateTimer() {
  timer--;
  document.getElementById('timer').innerText = timer;

  if (timer <= 0) {
    timer = refreshInterval;
    loadOnline();
    loadDeaths();
  }
}

loadOnline();
loadDeaths();
setInterval(updateTimer, 1000);

</script>

</body>
</html>
