<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiideHelper Dashboard</title>

<style>
body {
  margin: 0;
  font-family: 'Trebuchet MS', Tahoma, sans-serif;
  color: #f5e6c8;
  background: url('https://www.tibiabr.com/wp-content/uploads/2018/06/old_2002_tibia_art__extended_to_hd_widescreen__by_donotworr-dbpp9ky.png') no-repeat center center fixed;
  background-size: cover;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  z-index: -1;
}

.navbar {
  background: linear-gradient(#5a3b1f, #3e2a17);
  padding: 18px;
  text-align: center;
  border-bottom: 2px solid gold;
}

.navbar a {
  color: gold;
  text-decoration: none;
  margin: 0 25px;
  font-weight: bold;
}

.navbar a:hover {
  color: #fff;
}

h1 {
  text-align: center;
  color: gold;
  margin: 40px 0;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 0 20px 60px;
}

.card {
  background: rgba(62, 42, 23, 0.95);
  border: 1px solid gold;
  border-radius: 10px;
  padding: 30px;
  margin-bottom: 40px;
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
}

.card h2 {
  color: gold;
  border-bottom: 1px solid rgba(255,215,0,0.4);
  padding-bottom: 8px;
}

.vocation-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
  margin-top: 20px;
}

.vocation-card {
  background: rgba(0,0,0,0.25);
  padding: 15px;
  border-radius: 8px;
  border: 1px solid rgba(255,215,0,0.3);
}

.vocation-card h3 {
  margin-top: 0;
  color: gold;
}

ul {
  list-style: none;
  padding-left: 0;
  margin: 0;
}

li {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-size: 14px;
}

li:last-child {
  border-bottom: none;
}

.player-name {
  font-weight: bold;
  color: gold;
}

.top-player {
  background: rgba(255,215,0,0.08);
  border-left: 3px solid gold;
  padding-left: 8px;
}

.player-meta {
  opacity: 0.85;
  font-size: 13px;
}

a {
  color: gold;
  text-decoration: none;
}

a:visited {
  color: gold;
}

a:hover {
  color: #fff;
  text-shadow: 0 0 6px gold;
}

/* Death table improvement */
.death-row {
  display: grid;
  grid-template-columns: 1fr 120px 1.5fr;
  gap: 15px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-size: 14px;
}

.death-row:last-child {
  border-bottom: none;
}

.death-level {
  text-align: center;
  color: #ffcc66;
}

.death-killer {
  opacity: 0.85;
}

.counter {
  text-align: center;
  opacity: 0.6;
  margin-top: 15px;
}

@media (max-width: 768px) {

  .vocation-grid {
    grid-template-columns: 1fr;
  }

  .death-row {
    grid-template-columns: 1fr;
    gap: 5px;
  }

  .death-level {
    text-align: left;
  }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
</div>

<h1>⚔️ NiideHelper Dashboard ⚔️</h1>

<div class="container">

  <div class="card">
    <h2>🟢 Online Members</h2>
    <div class="vocation-grid" id="online"></div>
  </div>

  <div class="card">
    <h2>💀 Últimas 10 Mortes</h2>
    <div id="deaths"></div>
  </div>

  <div class="counter">
    Atualiza em <span id="timer">15</span>s
  </div>

</div>

<script>

let refreshInterval = 15;
let timer = refreshInterval;

function tibiaLink(name) {
  return `https://www.tibia.com/community/?name=${encodeURIComponent(name)}`;
}

async function loadOnline() {
  const res = await fetch('/api/public/online');
  const data = await res.json();

  const grid = document.getElementById('online');
  grid.innerHTML = '';

  for (const vocation in data) {
    if (!data[vocation] || data[vocation].length === 0) continue;

    const players = data[vocation];

    // Ordenar por level DESC
    players.sort((a, b) => b.level - a.level);

    const topLevel = players[0].level;

    let html = `
      <div class="vocation-card">
        <h3>${vocation} (${players.length})</h3>
        <ul>
    `;

    players.forEach(p => {

      const topClass = p.level === topLevel ? 'top-player' : '';

      html += `
        <li class="${topClass}">
          <div class="player-name">
            <a href="${tibiaLink(p.name)}" target="_blank">
              ${p.name}
            </a>
          </div>
          <div class="player-meta">
            Level ${p.level} — ${p.onlineTime}
          </div>
        </li>
      `;
    });

    html += `</ul></div>`;
    grid.innerHTML += html;
  }
}

async function loadDeaths() {
  const res = await fetch('/api/public/deaths');
  const data = await res.json();
  const container = document.getElementById('deaths');
  container.innerHTML = '';

  data.deaths.forEach(d => {
    container.innerHTML += `
      <div class="death-row">
        <div>
          <a href="${tibiaLink(d.characterName)}" target="_blank">
            ${d.characterName}
          </a>
        </div>
        <div class="death-level">
          Lv ${d.level}
        </div>
        <div class="death-killer">
          ${d.killers}
        </div>
      </div>
    `;
  });
}

function updateTimer() {
  timer--;
  document.getElementById('timer').innerText = timer;

  if (timer <= 0) {
    timer = refreshInterval;
    loadOnline();
    loadDeaths();
  }
}

loadOnline();
loadDeaths();
setInterval(updateTimer, 1000);

</script>

</body>
</html>
