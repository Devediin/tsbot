<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiideHelper Dashboard</title>

<style>
body { background:#2b1b10; font-family:Tahoma; color:white; padding:40px; }
h1 { text-align:center; color:#ffd700; }

.card {
  background:#3e2a17;
  border:2px solid #8b5a2b;
  border-radius:10px;
  padding:20px;
  margin-bottom:30px;
}

h2 { color:#ffd700; }

table {
  width:100%;
  border-collapse:collapse;
  margin-bottom:15px;
}

th, td {
  border-bottom:1px solid #8b5a2b;
  padding:5px;
}

.counter {
  text-align:right;
  font-size:12px;
  color:#aaa;
}
</style>
</head>
<body>

<h1>⚔️ NiideHelper Dashboard ⚔️</h1>

<div class="card">
  <h2>📅 Daily Info</h2>
  <div id="daily"></div>
</div>

<div class="card">
  <h2>🟢 Online Members</h2>
  <div id="online"></div>
</div>

<div class="card">
  <h2>💀 Últimas Mortes</h2>
  <table>
    <thead>
      <tr>
        <th>Personagem</th>
        <th>Level</th>
        <th>Killer</th>
      </tr>
    </thead>
    <tbody id="deathsTable"></tbody>
  </table>
</div>

<div class="counter">
  Atualização automática em <span id="timer">15</span>s
</div>

<script>

let refreshInterval = 15;
let timer = refreshInterval;

function tibiaLink(name) {
  return `https://www.tibia.com/community/?name=${encodeURIComponent(name)}`;
}

async function loadDaily() {
  const res = await fetch('/api/public/daily');
  const data = await res.json();
  if (data.description) {
    document.getElementById('daily').innerHTML = data.description;
  }
}

async function loadOnline() {
  const res = await fetch('/api/public/online');
  const data = await res.json();

  let html = '';

  for (const vocation in data) {
    if (data[vocation].length > 0) {
      html += `<h3>${vocation}</h3><table><tr><th>Nome</th><th>Level</th><th>Tempo Online</th></tr>`;
      data[vocation].forEach(p => {
        html += `
          <tr>
            <td><a href="${tibiaLink(p.name)}" target="_blank">${p.name}</a></td>
            <td>${p.level}</td>
            <td>${p.onlineTime}</td>
          </tr>
        `;
      });
      html += `</table>`;
    }
  }

  document.getElementById('online').innerHTML = html;
}

async function loadDeaths() {
  const res = await fetch('/api/public/deaths');
  const data = await res.json();

  const tbody = document.getElementById('deathsTable');
  tbody.innerHTML = '';

  data.deaths.forEach(d => {
    tbody.innerHTML += `
      <tr>
        <td><a href="${tibiaLink(d.characterName)}" target="_blank">${d.characterName}</a></td>
        <td>${d.level}</td>
        <td>${d.killer}</td>
      </tr>
    `;
  });
}

function updateTimer() {
  timer--;
  document.getElementById('timer').innerText = timer;
  if (timer <= 0) {
    timer = refreshInterval;
    loadDaily();
    loadOnline();
    loadDeaths();
  }
}

loadDaily();
loadOnline();
loadDeaths();
setInterval(updateTimer, 1000);

</script>

</body>
</html>
