<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<title>Dashboard</title>
<link rel="stylesheet" href="/assets/styles.css">
<script src="/assets/theme.js"></script>
</head>

<body>

<div class="overlay"></div>
<div id="navbar"></div>
  
<h1>⚔️ NiideHelper Dashboard ⚔️</h1>

<div class="container">

  <div class="total-box" id="totalOnline">
    Total Online: 0
  </div>

  <div class="card" id="onlineCard">
    <h2>🟢 Online Members</h2>
    <div class="vocation-grid" id="online"></div>
  </div>

  <div class="card" id="deathsCard">
    <h2>💀 Últimas 10 Mortes</h2>
    <div id="deaths"></div>
  </div>

  <div class="counter">
    Atualiza em <span id="timer">15</span>s
  </div>

</div>

<script>
let refreshInterval = 15;
let timer = refreshInterval;

function tibiaLink(name) {
  return `https://www.tibia.com/community/?subtopic=characters&name=${encodeURIComponent(name)}`;
}

function triggerGlow() {
  document.getElementById('onlineCard').classList.add('glow');
  document.getElementById('deathsCard').classList.add('glow');
  document.getElementById('totalOnline').classList.add('glow');

  setTimeout(() => {
    document.getElementById('onlineCard').classList.remove('glow');
    document.getElementById('deathsCard').classList.remove('glow');
    document.getElementById('totalOnline').classList.remove('glow');
  }, 800);
}

async function loadOnline() {
  const res = await fetch('/api/public/online');
  const data = await res.json();
  const grid = document.getElementById('online');
  grid.innerHTML = '';
  let total = 0;

  for (const vocation in data) {
    if (!data[vocation] || data[vocation].length === 0) continue;
    const players = data[vocation];
    players.sort((a, b) => b.level - a.level);
    const topLevel = players[0].level;
    total += players.length;

    let html = `<div class="vocation-card"><h3>${vocation} (${players.length})</h3><ul>`;
    players.forEach(p => {
      const topClass = p.level === topLevel ? 'top-player' : '';
      html += `
        <li class="${topClass}">
          <div class="player-name"><a href="${tibiaLink(p.name)}" target="_blank">${p.name}</a></div>
          <div class="player-meta">Level ${p.level} — ${p.onlineTime}</div>
        </li>`;
    });
    html += `</ul></div>`;
    grid.innerHTML += html;
  }
  document.getElementById('totalOnline').innerText = `Total Online: ${total}`;
}

async function loadDeaths() {
  const res = await fetch('/api/public/deaths');
  const data = await res.json();
  const container = document.getElementById('deaths');
  
  container.innerHTML = `
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; font-size: 0.75rem; border: 1px solid #333;">
      <span style="color: #00ff00; font-weight: bold;">● FRIEND</span>
      <span style="color: #ff4444; font-weight: bold;">● ENEMY</span>
    </div>
  `;

  if (!data.deaths || data.deaths.length === 0) {
    container.innerHTML += '<p style="text-align:center; color:#666;">Nenhuma morte detectada.</p>';
    return;
  }

  data.deaths.forEach(d => {
    const typeClass = d.type === 'enemy' ? 'death-enemy' : 'death-friend';
    
    container.innerHTML += `
      <div class="death-row ${typeClass}">
        <div class="death-main">
          <a href="${tibiaLink(d.characterName)}" target="_blank" class="death-name">${d.characterName}</a>
          <span class="death-level">Lv ${d.level}</span>
        </div>
        <div class="death-killers-line">
          <span class="killer-tag">por:</span> ${d.killers}
        </div>
      </div>
    `;
  });
}

function updateTimer() {
  timer--;
  document.getElementById('timer').innerText = timer;
  if (timer <= 0) {
    timer = refreshInterval;
    loadOnline();
    loadDeaths();
    triggerGlow();
  }
}

loadOnline();
loadDeaths();
setInterval(updateTimer, 1000);
</script>

<script src="/assets/navbar.js"></script>
<script src="/assets/theme.js"></script>
</body>
</html>
