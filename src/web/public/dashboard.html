<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiideHelper Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  color: #fff;
  background: url('https://www.tibiabr.com/wp-content/uploads/2018/06/old_2002_tibia_art__extended_to_hd_widescreen__by_donotworr-dbpp9ky.png') no-repeat center center fixed;
  background-size: cover;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: -1;
}

.navbar {
  background: linear-gradient(#4e3420, #3e2a17);
  padding: 15px;
  text-align: center;
  border-bottom: 3px solid gold;
}

.navbar a {
  color: gold;
  text-decoration: none;
  margin: 0 20px;
  font-weight: bold;
}

h1 {
  text-align: center;
  color: gold;
  margin: 30px 0;
  text-shadow: 2px 2px black;
}

.container {
  width: 85%;
  margin: auto;
  padding-bottom: 40px;
}

.card {
  background: #3e2a17;
  border: 2px solid gold;
  border-radius: 8px;
  padding: 20px;
  margin-top: 30px;
}

.card h2 {
  color: gold;
  margin-bottom: 15px;
  border-bottom: 1px solid gold;
  padding-bottom: 5px;
}

ul {
  list-style: none;
  padding-left: 0;
}

li {
  padding: 6px 0;
  border-bottom: 1px solid #5e3f24;
}

a {
  color: gold;
  text-decoration: none;
}

a:visited {
  color: gold;
}

.counter {
  text-align: center;
  margin-top: 20px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
</div>

<h1>⚔️ NiideHelper Dashboard ⚔️</h1>

<div class="container">

  <div class="card">
    <h2>🟢 Online Members</h2>
    <div id="online"></div>
  </div>

  <div class="card">
    <h2>💀 Últimas 10 Mortes</h2>
    <ul id="deaths"></ul>
  </div>

  <div class="counter">
    Atualiza em <span id="timer">15</span>s
  </div>

</div>

<script>

let refreshInterval = 15;
let timer = refreshInterval;

function tibiaLink(name) {
  return `https://www.tibia.com/community/?name=${encodeURIComponent(name)}`;
}

async function loadOnline() {
  const res = await fetch('/api/public/online');
  const data = await res.json();

  const container = document.getElementById('online');
  container.innerHTML = '';

  for (const vocation in data) {
    if (data[vocation] && data[vocation].length > 0) {

      let html = `<h3>${vocation}</h3><ul>`;

      data[vocation].forEach(p => {
        html += `
          <li>
            <a href="${tibiaLink(p.name)}" target="_blank">
              ${p.name}
            </a>
            — Level ${p.level}
            — ${p.onlineTime}
          </li>
        `;
      });

      html += `</ul>`;
      container.innerHTML += html;
    }
  }
}

async function loadDeaths() {
  const res = await fetch('/api/public/deaths');
  const data = await res.json();

  const list = document.getElementById('deaths');
  list.innerHTML = '';

  data.deaths.forEach(d => {
    list.innerHTML += `
      <li>
        <a href="${tibiaLink(d.characterName)}" target="_blank">
          ${d.characterName}
        </a>
        morreu no level ${d.level}
        para <b>${d.killers}</b>
      </li>
    `;
  });
}

function updateTimer() {
  timer--;
  document.getElementById('timer').innerText = timer;

  if (timer <= 0) {
    timer = refreshInterval;
    loadOnline();
    loadDeaths();
  }
}

loadOnline();
loadDeaths();
setInterval(updateTimer, 1000);

</script>

</body>
</html>
