<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiideHelper Dashboard</title>

<style>
body {
  margin: 0;
  font-family: 'Trebuchet MS', Tahoma, sans-serif;
  color: #f5e6c8;
  background: url('https://www.tibiabr.com/wp-content/uploads/2018/06/old_2002_tibia_art__extended_to_hd_widescreen__by_donotworr-dbpp9ky.png') no-repeat center center fixed;
  background-size: cover;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  z-index: -1;
}

.navbar {
  background: linear-gradient(#5a3b1f, #3e2a17);
  padding: 18px;
  text-align: center;
  border-bottom: 2px solid gold;
}

.navbar a {
  color: gold;
  text-decoration: none;
  margin: 0 25px;
  font-weight: bold;
}

.navbar a:hover {
  color: #fff;
}

h1 {
  text-align: center;
  color: gold;
  margin: 40px 0;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 0 20px 60px;
}

.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}

.stat-box {
  background: rgba(62,42,23,0.95);
  border: 1px solid gold;
  padding: 15px 25px;
  border-radius: 8px;
  text-align: center;
  min-width: 120px;
  box-shadow: 0 0 15px rgba(0,0,0,0.7);
}

.stat-box h3 {
  margin: 0;
  color: gold;
}

.stat-box span {
  font-size: 22px;
  font-weight: bold;
}

.card {
  background: rgba(62, 42, 23, 0.95);
  border: 1px solid gold;
  border-radius: 10px;
  padding: 30px;
  margin-bottom: 40px;
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
  animation: fadeIn 0.4s ease-in-out;
}

.card h2 {
  color: gold;
  border-bottom: 1px solid rgba(255,215,0,0.4);
  padding-bottom: 8px;
}

.vocation-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  margin-top: 20px;
}

.vocation-card {
  background: rgba(0,0,0,0.3);
  padding: 15px;
  border-radius: 8px;
  border: 1px solid rgba(255,215,0,0.3);
}

.vocation-card h3 {
  margin-top: 0;
  color: gold;
}

ul {
  list-style: none;
  padding-left: 0;
  margin: 0;
}

li {
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-size: 14px;
}

a {
  color: gold;
  text-decoration: none;
  font-weight: bold;
}

a:visited {
  color: gold;
}

a:hover {
  color: #fff;
  text-shadow: 0 0 5px gold;
}

.counter {
  text-align: center;
  opacity: 0.6;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Mobile */
@media (max-width: 768px) {
  .stats {
    flex-direction: column;
    align-items: center;
  }

  .vocation-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
</div>

<h1>⚔️ NiideHelper Dashboard ⚔️</h1>

<div class="container">

  <div class="stats" id="stats"></div>

  <div class="card">
    <h2>🟢 Online Members</h2>
    <div class="vocation-grid" id="online"></div>
  </div>

  <div class="card">
    <h2>💀 Últimas 10 Mortes</h2>
    <ul id="deaths"></ul>
  </div>

  <div class="counter">
    Atualiza em <span id="timer">15</span>s
  </div>

</div>

<script>

let refreshInterval = 15;
let timer = refreshInterval;

function tibiaLink(name) {
  return `https://www.tibia.com/community/?name=${encodeURIComponent(name)}`;
}

async function loadOnline() {
  const res = await fetch('/api/public/online');
  const data = await res.json();

  const grid = document.getElementById('online');
  const stats = document.getElementById('stats');

  grid.innerHTML = '';
  stats.innerHTML = '';

  let totalOnline = 0;

  for (const vocation in data) {
    if (data[vocation] && data[vocation].length > 0) {

      const count = data[vocation].length;
      totalOnline += count;

      let html = `
        <div class="vocation-card">
          <h3>${vocation} (${count})</h3>
          <ul>
      `;

      data[vocation].forEach(p => {
        html += `
          <li>
            <a href="${tibiaLink(p.name)}" target="_blank">
              ${p.name}
            </a>
            — Lv ${p.level}
            — ${p.onlineTime}
          </li>
        `;
      });

      html += `</ul></div>`;
      grid.innerHTML += html;

      stats.innerHTML += `
        <div class="stat-box">
          <h3>${vocation}</h3>
          <span>${count}</span>
        </div>
      `;
    }
  }

  stats.innerHTML = `
    <div class="stat-box">
      <h3>Total Online</h3>
      <span>${totalOnline}</span>
    </div>
  ` + stats.innerHTML;
}

async function loadDeaths() {
  const res = await fetch('/api/public/deaths');
  const data = await res.json();
  const list = document.getElementById('deaths');
  list.innerHTML = '';

  data.deaths.forEach(d => {
    list.innerHTML += `
      <li>
        <a href="${tibiaLink(d.characterName)}" target="_blank">
          ${d.characterName}
        </a>
        morreu no level ${d.level}
        para <b>${d.killers}</b>
      </li>
    `;
  });
}

function updateTimer() {
  timer--;
  document.getElementById('timer').innerText = timer;

  if (timer <= 0) {
    timer = refreshInterval;
    loadOnline();
    loadDeaths();
  }
}

loadOnline();
loadDeaths();
setInterval(updateTimer, 1000);

</script>

</body>
</html>
