<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiideHelper Dashboard</title>

<style>
body {
  background:#2b1b10;
  font-family:Tahoma;
  color:white;
  padding:40px;
}

h1 {
  color:#ffd700;
  text-align:center;
}

.card {
  background:#3e2a17;
  border:2px solid #8b5a2b;
  border-radius:10px;
  padding:20px;
  margin-bottom:30px;
}

.friend { color:#00ff00; }
.enemy { color:#ff4444; }

a {
  color:#ffd700;
  text-decoration:none;
}
</style>
</head>
<body>

<h1>⚔️ NiideHelper Dashboard ⚔️</h1>

<div class="card">
  <h2>🟢 Online</h2>
  <div id="online"></div>
</div>

<div class="card">
  <h2>💀 Últimas Mortes</h2>
  <div id="deaths"></div>
</div>

<script>

function tibiaLink(name) {
  return `https://www.tibia.com/community/?name=${encodeURIComponent(name)}`;
}

async function loadOnline() {
  const res = await fetch('/api/public/online');
  const data = await res.json();

  let html = '';

  data.online.forEach(p => {
    html += `
    <div class="${p.type}">
      <a href="${tibiaLink(p.name)}" target="_blank">
        ${p.name}
      </a>
      - ${p.level} (${p.vocation})
    </div>
    `;
  });

  document.getElementById('online').innerHTML = html;
}

async function loadDeaths() {
  const res = await fetch('/api/public/deaths');
  const data = await res.json();

  let html = '';

  data.deaths.forEach(d => {
    html += `
    <div>
      💀 <a href="${tibiaLink(d.characterName)}" target="_blank">
      ${d.characterName}
      </a>
    </div>
    `;
  });

  document.getElementById('deaths').innerHTML = html;
}

loadOnline();
loadDeaths();

// Atualização automática a cada 15 segundos
setInterval(() => {
  loadOnline();
  loadDeaths();
}, 15000);

</script>

</body>
</html>
