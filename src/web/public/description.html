<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador de Descrição</title>

<style>
body {
  font-family: Tahoma, Arial;
  color: #fff;
  margin: 0;
  background: url('https://www.tibiabr.com/wp-content/uploads/2018/06/old_2002_tibia_art__extended_to_hd_widescreen__by_donotworr-dbpp9ky.png') no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  backdrop-filter: blur(4px);
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

.navbar {
  background:#3e2a17;
  padding:15px;
  text-align:center;
  border-bottom:2px solid #8b5a2b;
}

.navbar a {
  color:#ffd700;
  text-decoration:none;
  margin:0 20px;
  font-weight:bold;
}

.container {
  padding:40px;
  text-align:center;
}

input {
  padding:10px;
  width:300px;
  margin-top:20px;
}

button {
  padding:10px 20px;
  background:#00AAFF;
  border:none;
  color:white;
  margin-top:20px;
}

textarea {
  width:600px;
  height:80px;
  margin-top:20px;
  resize:none;
  background:#222;
  color:white;
  border:none;
  padding:10px;
}
</style>
</head>
<body>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
  <a href="/login.html">🔐 Admin</a>
</div>

<div class="container">

<h1>📜 Gerador de Descrição</h1>

<input id="charName" placeholder="Nome do personagem"><br>
<button onclick="generate()">Validar e Gerar</button>

<div id="info" style="margin-top:30px;"></div>

<textarea id="result" readonly></textarea><br>
<button onclick="copy()">Copiar</button>

</div>

<script>
async function generate() {
  const characterName = document.getElementById('charName').value;

  const res = await fetch('/api/description/generate', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({characterName})
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById('info').innerHTML = `
    <b>Level:</b> ${data.character.level}<br>
    <b>Vocação:</b> ${data.character.vocation}<br>
    <b>Guild:</b> ${data.character.guild || 'Sem guild'}
  `;

  document.getElementById('result').value = data.description;
}

function copy() {
  const textarea = document.getElementById('result');
  textarea.select();
  document.execCommand("copy");
  alert("Copiado!");
}
</script>

</body>
</html>
