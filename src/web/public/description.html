<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador de Descrição</title>

<style>
body {
  margin: 0;
  font-family: 'Trebuchet MS', Tahoma, sans-serif;
  color: #f5e6c8;
  background: url('https://www.tibiabr.com/wp-content/uploads/2018/06/old_2002_tibia_art__extended_to_hd_widescreen__by_donotworr-dbpp9ky.png') no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  z-index: -1;
}

.navbar {
  background: linear-gradient(#5a3b1f, #3e2a17);
  padding: 18px;
  text-align: center;
  border-bottom: 2px solid gold;
}

.navbar a {
  color: gold;
  text-decoration: none;
  margin: 0 25px;
  font-weight: bold;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 60px 20px;
  text-align: center;
}

.card {
  background: rgba(62, 42, 23, 0.95);
  border: 1px solid gold;
  border-radius: 10px;
  padding: 40px;
  box-shadow: 0 0 25px rgba(0,0,0,0.7);
}

h1 {
  color: gold;
  margin-bottom: 30px;
}

input {
  padding: 12px;
  width: 320px;
  border-radius: 6px;
  border: none;
  font-size: 14px;
}

button {
  padding: 10px 25px;
  margin-top: 20px;
  border: none;
  border-radius: 6px;
  background: gold;
  color: #3e2a17;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.85;
}

textarea {
  width: 100%;
  height: 100px;
  margin-top: 25px;
  resize: none;
  background: #1a1a1a;
  color: #fff;
  border: 1px solid gold;
  border-radius: 6px;
  padding: 10px;
}

#info {
  margin-top: 25px;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
  <span class="theme-toggle" onclick="toggleTheme()">🌓</span>
</div>

<div class="container">
  <div class="card">

    <h1>📜 Gerador de Descrição</h1>

    <input id="charName" placeholder="Nome do personagem"><br>
    <button onclick="generate()">Validar e Gerar</button>

    <div id="info"></div>

    <textarea id="result" readonly></textarea><br>
    <button onclick="copy()">Copiar</button>

  </div>
</div>

<script>
async function generate() {
  const characterName = document.getElementById('charName').value;

  const res = await fetch('/api/description/generate', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({characterName})
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById('info').innerHTML = `
    <b>Level:</b> ${data.character.level}<br>
    <b>Vocação:</b> ${data.character.vocation}<br>
    <b>Guild:</b> ${data.character.guild || 'Sem guild'}
  `;

  document.getElementById('result').value = data.description;
}

function copy() {
  const textarea = document.getElementById('result');
  textarea.select();
  document.execCommand("copy");
  alert("Copiado!");
}
</script>

</body>
</html>
