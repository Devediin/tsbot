<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerador de Descrição</title>
<link rel="stylesheet" href="/assets/styles.css">
<script src="/assets/theme.js"></script>

</head>

<body>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
  <span class="theme-toggle" onclick="toggleTheme()">🌓</span>
</div>

<div class="container">
  <div class="card">

    <h1>📜 Gerador de Descrição</h1>

    <input id="charName" placeholder="Nome do personagem"><br>
    <button onclick="generate()">Validar e Gerar</button>

    <div id="info"></div>

    <textarea id="result" readonly></textarea><br>
    <button onclick="copy()">Copiar</button>

  </div>
</div>

<script>
async function generate() {
  const characterName = document.getElementById('charName').value;

  const res = await fetch('/api/description/generate', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({characterName})
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById('info').innerHTML = `
    <b>Level:</b> ${data.character.level}<br>
    <b>Vocação:</b> ${data.character.vocation}<br>
    <b>Guild:</b> ${data.character.guild || 'Sem guild'}
  `;

  document.getElementById('result').value = data.description;
}

function copy() {
  const textarea = document.getElementById('result');
  textarea.select();
  document.execCommand("copy");
  alert("Copiado!");
}
</script>

</body>
</html>
