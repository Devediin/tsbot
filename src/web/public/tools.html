<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💰 Tibia Loot Split</title>
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>

<div class="overlay"></div>

<h1>💰 Divisão de Loot</h1>

<div class="container">

  <div class="card">
    <textarea id="lootText" placeholder="📋 Cole aqui o log completo da hunt..."></textarea>
    <button onclick="calculate()">⚔️ Calcular Divisão</button>
  </div>

  <div class="card">
    <h3>📊 Resultado:</h3>
    <div id="result"></div>
    <br>
    <button onclick="copyAll()">📎 Copiar resultado</button>
    <div class="success-box" id="successMsg">✅ Texto copiado com sucesso!</div>
  </div>

</div>

<script src="/assets/theme.js"></script>

<script>

let fullText = '';

async function calculate() {

  const text = document.getElementById('lootText').value;

  const res = await fetch('/api/public/loot', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = '';
  fullText = '';

  data.transfers.forEach(t => {

    const roundedK = Math.round(t.amount / 1000);
    const bankValue = t.amount - 1;

    const lineText =
      `💸 ${t.from} deve pagar ${roundedK}k para ${t.to} ` +
      `(Banco: transfer ${bankValue} to ${t.to})`;

    const line = document.createElement('div');
    line.className = 'result-line';

    const span = document.createElement('span');
    span.innerText = lineText;

    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.innerText = 'Copiar transfer';
    btn.onclick = function() {
      copyText(`transfer ${bankValue} to ${t.to}`);
    };

    line.appendChild(span);
    line.appendChild(btn);

    resultDiv.appendChild(line);
    fullText += lineText + '\n\n';
  });

  const totalKK = (data.totalProfit / 1000000).toFixed(2);
  const perPlayerK = Math.round(data.perPlayer / 1000);
  const perHourK = Math.round(data.profitPerHour / 1000);

  const summary1 =
    `💰 Lucro total: ${totalKK}kk~ → ${perPlayerK}k~ para cada jogador.`;

  const summary2 =
    `⏱️ Duração da hunt: ${data.duration} → ${perHourK}k~ por hora para cada jogador.`;

  const sumDiv1 = document.createElement('div');
  sumDiv1.innerText = summary1;

  const sumDiv2 = document.createElement('div');
  sumDiv2.innerText = summary2;

  resultDiv.appendChild(document.createElement('br'));
  resultDiv.appendChild(sumDiv1);
  resultDiv.appendChild(document.createElement('br'));
  resultDiv.appendChild(sumDiv2);

  fullText += summary1 + '\n\n';
  fullText += summary2;
}

function copyText(text) {

  const textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);

  showSuccess();
}

function copyAll() {

  if (!fullText) return;

  const textarea = document.createElement("textarea");
  textarea.value = fullText;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);

  showSuccess();
}

function showSuccess() {
  const box = document.getElementById('successMsg');
  box.style.display = 'block';

  setTimeout(() => {
    box.style.display = 'none';
  }, 2000);
}

</script>
<script>
fetch('/partials/navbar.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('navbar').innerHTML = data;
  });
</script>
</body>
</html>
