<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tibia Loot Split</title>
<link rel="stylesheet" href="/assets/styles.css">
</head>
<body>

<div class="overlay"></div>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
  <a href="/tools.html">🧮 Tools</a>
  <span class="theme-toggle" onclick="toggleTheme()">🌓</span>
</div>

<h1>🧮 Tibia Loot Split</h1>

<div class="container">

  <div class="card">
    <textarea id="lootText" placeholder="Cole aqui o log completo da hunt..."></textarea>
    <button onclick="calculate()">Calcular</button>
  </div>

  <div class="card">
    <pre id="result"></pre>
    <div style="margin-top:15px;">
      <button onclick="copyResult()">Copiar Resultado Completo</button>
      <button onclick="copyBank()">Copiar Apenas Bank Transfers</button>
    </div>
  </div>

</div>

<script src="/assets/theme.js"></script>

<script>

let lastResultText = '';
let lastBankText = '';

async function calculate() {

  const text = document.getElementById('lootText').value;

  const res = await fetch('/api/public/loot', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  let output = '';
  let bankOnly = '';

  data.transfers.forEach(t => {

    const roundedK = Math.round(t.amount / 1000);
    const bankValue = t.amount - 1; // igual TibiaPal

    output += `${t.from} to pay ${roundedK}k to ${t.to} (Bank: transfer ${bankValue} to ${t.to})\n\n`;

    bankOnly += `transfer ${bankValue} to ${t.to}\n`;
  });

  const totalKK = (data.totalProfit / 1000000).toFixed(2);
  const perPlayerK = Math.round(data.perPlayer / 1000);
  const perHourK = Math.round(data.profitPerHour / 1000);

  output += `Total profit: ${totalKK}kk~ which is: ${perPlayerK}k~ for each player.\n\n`;
  output += `Session duration: ${data.duration}, which is: ${perHourK}k~ for each player per hour.`;

  document.getElementById('result').innerText = output;

  lastResultText = output;
  lastBankText = bankOnly;
}

function copyResult() {
  if (!lastResultText) return;
  navigator.clipboard.writeText(lastResultText);
  alert('Resultado completo copiado!');
}

function copyBank() {
  if (!lastBankText) return;
  navigator.clipboard.writeText(lastBankText);
  alert('Bank transfers copiado!');
}

</script>

</body>
</html>
