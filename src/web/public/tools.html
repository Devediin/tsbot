<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tibia Loot Split</title>
<link rel="stylesheet" href="/assets/styles.css">
<style>
.result-line {
  margin-bottom: 8px;
}
.copy-btn {
  margin-left: 10px;
  padding: 2px 8px;
  font-size: 12px;
  cursor: pointer;
}
.green {
  color: #00ff66;
}
</style>
</head>
<body>

<div class="overlay"></div>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
  <a href="/tools.html">🧮 Tools</a>
  <span class="theme-toggle" onclick="toggleTheme()">🌓</span>
</div>

<h1>🧮 Tibia Loot Split</h1>

<div class="container">

  <div class="card">
    <textarea id="lootText" placeholder="Cole aqui o log completo da hunt..."></textarea>
    <button onclick="calculate()">Calcular</button>
  </div>

  <div class="card">
    <h3>Results:</h3>
    <div id="result"></div>
    <br>
    <button onclick="copyAll()">Copy all to Discord!</button>
  </div>

</div>

<script src="/assets/theme.js"></script>

<script>

let fullText = '';

async function calculate() {

  const text = document.getElementById('lootText').value;

  const res = await fetch('/api/public/loot', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = '';
  fullText = '';

  data.transfers.forEach(t => {

    const roundedK = Math.round(t.amount / 1000);
    const bankValue = t.amount - 1;

    const lineText = `${t.from} to pay ${roundedK}k to ${t.to} (Bank: transfer ${bankValue} to ${t.to})`;

    const line = document.createElement('div');
    line.className = 'result-line';

    const span = document.createElement('span');
    span.innerText = lineText;

    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.innerText = 'Copy';
    btn.onclick = function() {
      navigator.clipboard.writeText(`transfer ${bankValue} to ${t.to}`);
      alert('Transfer copied!');
    };

    line.appendChild(span);
    line.appendChild(btn);

    resultDiv.appendChild(line);
    fullText += lineText + '\n\n';
  });

  const totalKK = (data.totalProfit / 1000000).toFixed(2);
  const perPlayerK = Math.round(data.perPlayer / 1000);
  const perHourK = Math.round(data.profitPerHour / 1000);

  const summary1 = `Total profit: ${totalKK}kk~ which is: ${perPlayerK}k~ for each player.`;
  const summary2 = `Session duration: ${data.duration}, which is: ${perHourK}k~ for each player per hour.`;

  const sumDiv1 = document.createElement('div');
  sumDiv1.innerHTML = summary1;

  const sumDiv2 = document.createElement('div');
  sumDiv2.innerHTML = summary2;

  resultDiv.appendChild(document.createElement('br'));
  resultDiv.appendChild(sumDiv1);
  resultDiv.appendChild(document.createElement('br'));
  resultDiv.appendChild(sumDiv2);

  fullText += summary1 + '\n\n';
  fullText += summary2;
}

function copyAll() {
  navigator.clipboard.writeText(fullText);
  alert('All copied!');
}

</script>

</body>
</html>
