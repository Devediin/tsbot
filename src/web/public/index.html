<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiideHelper</title>

<style>
body {
  margin: 0;
  font-family: Tahoma, Arial, sans-serif;
  color: #fff;
  background: url('https://www.tibiabr.com/wp-content/uploads/2018/06/old_2002_tibia_art__extended_to_hd_widescreen__by_donotworr-dbpp9ky.png') no-repeat center center fixed;
  background-size: cover;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: -1;
}

.navbar {
  background: linear-gradient(#4e3420, #3e2a17);
  padding: 15px;
  text-align: center;
  border-bottom: 3px solid gold;
}

.navbar a {
  color: gold;
  text-decoration: none;
  margin: 0 20px;
  font-weight: bold;
}

.container {
  width: 85%;
  margin: auto;
  padding: 40px;
}

.card {
  background: #3e2a17;
  border: 2px solid gold;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 30px;
}

h1 {
  text-align: center;
  color: gold;
}

a {
  color: gold;
  text-decoration: none;
}

a:visited {
  color: gold;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
</div>

<div class="container">

<h1>⚔️ NiideHelper ⚔️</h1>

<div class="card daily-card">
  <h2>⚔️ Daily Info</h2>

  <div>
    <h3>🌍 Servidor</h3>
    <p id="serverName"></p>
  </div>

  <div>
    <h3>🧳 Rashid</h3>
    <p id="rashidCity"></p>
  </div>

  <div>
    <h3>🧞 Yasir</h3>
    <p id="yasirStatus"></p>
  </div>

  <div>
    <h3>👑 Dream Courts</h3>
    <p id="dreamBoss"></p>
  </div>

  <div>
    <h3>🎭 Tibiadrome</h3>
    <p id="tibiadromeInfo"></p>
  </div>

  <small id="updatedAt"></small>
</div>

<div class="card">
  <h2 id="liveTitle">🔴 LIVE OFFLINE</h2>
  <div id="liveContent"></div>
</div>

</div>

<script>
async function loadDaily() {
  const res = await fetch('/api/public/daily');
  const data = await res.json();

  if (!data.server) return;

  document.getElementById('serverName').innerText =
    data.server.name;

  document.getElementById('rashidCity').innerText =
    data.rashid.city;

  document.getElementById('yasirStatus').innerText =
    data.yasir.active
      ? '🟢 ' + data.yasir.label
      : '🔴 ' + data.yasir.label;

  document.getElementById('dreamBoss').innerText =
    data.dreamCourts.boss;

  document.getElementById('tibiadromeInfo').innerText =
    `Rotação #${data.tibiadrome.rotation} (${data.tibiadrome.start} → ${data.tibiadrome.end})`;

  document.getElementById('updatedAt').innerText =
    `Atualizado em ${data.updatedAt}`;
}

async function loadLive() {
  const res = await fetch('/api/public/live');
  const data = await res.json();

  const liveTitle = document.getElementById('liveTitle');
  const liveContent = document.getElementById('liveContent');

  if (data.live && data.data) {
    liveTitle.innerHTML = '🟢 LIVE ONLINE';
    liveContent.innerHTML = `
      <img src="${data.data.thumbnail}" style="width:100%;border-radius:8px;" />
      <p><b>${data.data.user}</b></p>
      <p>${data.data.title}</p>
      <a href="https://twitch.tv/${data.data.user}" target="_blank">Assistir</a>
    `;
  } else {
    liveTitle.innerHTML = '🔴 LIVE OFFLINE';
    liveContent.innerHTML = '';
  }
}

loadDaily();
loadLive();
</script>

</body>
</html>
