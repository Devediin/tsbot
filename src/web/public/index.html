<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiideHelper</title>
<link rel="stylesheet" href="/assets/styles.css">
<script src="/assets/theme.js"></script>
</head>

<body>

<div class="overlay"></div>

<script>
fetch('/partials/navbar.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('navbar').innerHTML = data;
  });
</script>

<div class="container">

<h1>⚔️ NiideHelper ⚔️</h1>

<div class="card daily-card">
  <h2>⚔️ Daily Info</h2>

  <div>
    <h3>🌍 Servidor</h3>
    <p id="serverName"></p>
  </div>

  <div>
    <h3>🧳 Rashid</h3>
    <p id="rashidCity"></p>
  </div>

  <div>
    <h3>🧞 Yasir</h3>
    <p id="yasirStatus"></p>
  </div>

  <div>
    <h3>👑 Dream Courts</h3>
    <p id="dreamBoss"></p>
  </div>

  <div>
    <h3>🎭 Tibiadrome</h3>
    <p id="tibiadromeInfo"></p>
  </div>

  <small id="updatedAt"></small>
</div>

<div class="card">
  <h2 id="liveTitle">🔴 LIVE OFFLINE</h2>
  <div id="liveContent"></div>
</div>

</div>

<script>
async function loadDaily() {
  const res = await fetch('/api/public/daily');
  const data = await res.json();

  if (!data.server) return;

  document.getElementById('serverName').innerText =
    data.server.name;

  document.getElementById('rashidCity').innerText =
    data.rashid.city;

  document.getElementById('yasirStatus').innerText =
    data.yasir.active
      ? '🟢 ' + data.yasir.label
      : '🔴 ' + data.yasir.label;

  document.getElementById('dreamBoss').innerText =
    data.dreamCourts.boss;

  document.getElementById('tibiadromeInfo').innerText =
    `Rotação #${data.tibiadrome.rotation} (${data.tibiadrome.start} → ${data.tibiadrome.end})`;

  document.getElementById('updatedAt').innerText =
    `Atualizado em ${data.updatedAt}`;
}

async function loadLive() {
  const res = await fetch('/api/public/live');
  const data = await res.json();

  const liveTitle = document.getElementById('liveTitle');
  const liveContent = document.getElementById('liveContent');

  const channel = data.data?.user || "EdiinTv";

  let thumbnail;

  if (data.live && data.data?.thumbnail) {
    thumbnail = data.data.thumbnail
      .replace('{width}', '640')
      .replace('{height}', '360');
  } else {
    thumbnail = `https://static-cdn.jtvnw.net/previews-ttv/live_user_${channel}-640x360.jpg`;
  }

  const badgeClass = data.live ? 'live-online' : 'live-offline';
  const badgeText = data.live ? '🔴 AO VIVO' : 'OFFLINE';

  const title = data.live && data.data
    ? data.data.title
    : 'Canal offline no momento';

  liveTitle.innerHTML = data.live
    ? '🟢 LIVE ONLINE'
    : '🔴 LIVE OFFLINE';

  liveContent.innerHTML = `
    <div class="live-wrapper">
      <img src="${thumbnail}" />
      <div class="live-badge ${badgeClass}">
        ${badgeText}
      </div>
      <div class="live-overlay">
        <div class="live-info">
          <h3>${channel}</h3>
          <p>${title}</p>
          <a href="https://twitch.tv/${channel}" target="_blank" class="live-button">
            ${data.live ? 'Assistir Agora' : 'Visitar Canal'}
          </a>
        </div>
      </div>
    </div>
  `;
}

loadDaily();
loadLive();
setInterval(loadLive, 60000);
</script>

</body>
</html>
