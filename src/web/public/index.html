<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiideHelper</title>

<style>
body {
  background:#2b1b10;
  font-family:Tahoma;
  color:white;
  margin:0;
}

.navbar {
  background:#3e2a17;
  padding:15px;
  text-align:center;
  border-bottom:2px solid #8b5a2b;
}

.navbar a {
  color:#ffd700;
  text-decoration:none;
  margin:0 20px;
  font-weight:bold;
}

.container {
  padding:40px;
}

.card {
  background:#3e2a17;
  border:2px solid #8b5a2b;
  border-radius:10px;
  padding:20px;
  margin-bottom:30px;
}

h1 {
  text-align:center;
  color:#ffd700;
}
</style>
</head>
<body>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
  <a href="/login.html">🔐 Admin</a>
</div>

<div class="container">

<h1>⚔️ NiideHelper ⚔️</h1>

<div class="card">
  <h2>📅 Daily Info</h2>
  <div id="daily"></div>
</div>

</div>

<script>
async function loadDaily() {
  const res = await fetch('/api/public/daily');
  const data = await res.json();

  if (data.description) {
    document.getElementById('daily').innerHTML = data.description;
  }
}

loadDaily();
</script>

</body>
</html>
