<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NiideHelper</title>

<style>
body {
  background: radial-gradient(circle at center, #3e2a17 0%, #2b1b10 70%);
  font-family: Tahoma;
  color: #fff;
  margin: 0;
}

.navbar {
  background: linear-gradient(#4e3420, #3e2a17);
  padding: 15px;
  text-align: center;
  border-bottom: 3px solid gold;
}

.navbar a {
  color: gold;
  text-decoration: none;
  margin: 0 20px;
  font-weight: bold;
}

.container {
  width: 85%;
  margin: auto;
  padding: 40px;
}

.card {
  background: #3e2a17;
  border: 2px solid gold;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 30px;
}

h1 {
  text-align: center;
  color: gold;
}

.live-box img {
  width: 100%;
  border-radius: 8px;
}

.live-badge {
  color: #00ff00;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="/">🏠 Home</a>
  <a href="/description.html">📜 Gerador</a>
  <a href="/dashboard.html">📊 Dashboard</a>
</div>

<h1>⚔️ NiideHelper ⚔️</h1>

<div class="container">

  <div class="card">
    <h2>📅 Daily Info</h2>
    <div id="daily"></div>
  </div>

  <div class="card live-box">
    <h2 id="liveTitle">🔴 LIVE OFFLINE</h2>
    <div id="liveContent"></div>
  </div>

</div>

<script>
async function loadDaily() {
  const res = await fetch('/api/public/daily');
  const data = await res.json();

  if (!data.server) {
    document.getElementById('daily').innerHTML = 'Daily Info ainda não disponível.';
    return;
  }

  document.getElementById('daily').innerHTML = `
    <b>Server Save:</b> ${data.server} voltou às ${data.serverSaveTime}<br><br>
    <b>Rashid:</b> ${data.rashid}<br><br>
    <b>Yasir:</b> ${data.yasirOnline ? 'ONLINE' : 'OFFLINE'}<br><br>
    <b>Dream Courts:</b> ${data.dreamBoss}<br><br>
    <b>Tibiadrome:</b> Rotação #${data.tibiadrome.number}<br>
    ${data.tibiadrome.start} → ${data.tibiadrome.end}
  `;
}

async function loadLive() {
  const res = await fetch('/api/public/live');
  const data = await res.json();

  const liveTitle = document.getElementById('liveTitle');
  const liveContent = document.getElementById('liveContent');

  if (data.live && data.data) {
    liveTitle.innerHTML = '🟢 LIVE ONLINE';
    liveContent.innerHTML = `
      <img src="${data.data.thumbnail}" />
      <p><b>${data.data.user}</b></p>
      <p>${data.data.title}</p>
      <a href="https://twitch.tv/${data.data.user}" target="_blank">Assistir</a>
    `;
  } else {
    liveTitle.innerHTML = '🔴 LIVE OFFLINE';
    liveContent.innerHTML = '';
  }
}

loadDaily();
loadLive();
</script>

</body>
</html>
